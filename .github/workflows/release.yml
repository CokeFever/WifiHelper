name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
          retention-days: 14

  build:
    name: Build Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update versionName in build.gradle.kts
        run: |
          sed -i "s/versionName = \"1.0.0\"/versionName = \"${{ steps.version.outputs.VERSION }}\"/" app/build.gradle.kts

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Build Release AAB (App Bundle)
        run: ./gradlew bundleRelease

      - name: Rename artifacts
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/WifiHelper-${VERSION}.apk
          cp app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/WifiHelper-${VERSION}.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WiFi Helper ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/WifiHelper-${{ steps.version.outputs.VERSION }}.apk
            app/build/outputs/bundle/release/WifiHelper-${{ steps.version.outputs.VERSION }}.aab
